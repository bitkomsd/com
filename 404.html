<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Страница не найдена — Bitcoin Bonus</title>
    <style>
        /* --- Импорт шрифта, как на оригинальном сайте --- */
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap');

        /* --- Сброс и базовые стили --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Тёмный градиентный фон, как на многих крипто-страницах */
            background: linear-gradient(145deg, #0b1a2e 0%, #1a2f3f 100%);
            font-family: 'Open Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* --- Декоративные элементы фона (как намёк на блокчейн/крипто-стиль) --- */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(42, 181, 97, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(36, 111, 243, 0.05) 0%, transparent 50%);
            z-index: 0;
            animation: rotateGlow 40s linear infinite;
        }

        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- Основной контейнер --- */
        .container {
            text-align: center;
            max-width: 620px;
            width: 100%;
            position: relative;
            z-index: 1;
            background: rgba(11, 26, 46, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        }

        /* --- Крипто-иконка (стилизованный блок) --- */
        .crypto-icon {
            font-size: 4rem;
            margin-bottom: 5px;
            display: block;
            filter: drop-shadow(0 0 30px rgba(42, 181, 97, 0.2));
            letter-spacing: 8px;
        }

        /* --- Большая цифра 404 (в стиле bitmom) --- */
        .big-404 {
            font-size: 7rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 5px;
            /* Градиент, сочетающий зелёный (#2ab561) и синий (#246ff3) — основные цвета сайта */
            background: linear-gradient(135deg, #2ab561 0%, #246ff3 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
        }

        /* --- Заголовок --- */
        .subtitle {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        /* --- Описание --- */
        .message {
            font-size: 1rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .message strong {
            color: #2ab561;
            font-weight: 600;
        }

        /* --- Прелоудер (спиннер в стиле bitmom) --- */
        .loader-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin: 20px 0 25px;
        }

        .loader {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.08);
            border-top-color: #2ab561;
            border-right-color: #246ff3;
            animation: spin 0.9s cubic-bezier(0.6, 0, 0.4, 1) infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* --- Обратный отсчёт (стилизованный "бейдж") --- */
        .countdown {
            font-size: 0.95rem;
            font-weight: 400;
            background: rgba(42, 181, 97, 0.08);
            padding: 10px 28px;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid rgba(42, 181, 97, 0.15);
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .countdown span {
            font-weight: 700;
            color: #2ab561;
            font-size: 1.3rem;
            min-width: 28px;
            display: inline-block;
        }

        /* --- Кнопка (в стиле кнопок bitmom) --- */
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #2ab561 0%, #1d8a4a 100%);
            color: #fff;
            border: none;
            padding: 16px 48px;
            font-size: 1.05rem;
            font-weight: 700;
            font-family: 'Open Sans', sans-serif;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            box-shadow: 0 8px 30px rgba(42, 181, 97, 0.25);
            letter-spacing: 0.3px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 40px rgba(42, 181, 97, 0.4);
            background: linear-gradient(135deg, #30c96b 0%, #1d8a4a 100%);
        }

        .btn:active {
            transform: scale(0.97);
        }

        /* --- Адаптив --- */
        @media (max-width: 520px) {
            .container {
                padding: 35px 20px;
            }
            .big-404 {
                font-size: 5rem;
            }
            .subtitle {
                font-size: 1.2rem;
            }
            .crypto-icon {
                font-size: 3rem;
            }
            .btn {
                padding: 14px 32px;
                font-size: 0.95rem;
                width: 100%;
            }
            .countdown {
                font-size: 0.85rem;
                padding: 8px 18px;
            }
        }

        @media (max-width: 380px) {
            .big-404 {
                font-size: 4rem;
            }
            .container {
                padding: 25px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Крипто-символ (намёк на тематику) -->
        <span class="crypto-icon">⛓️</span>

        <!-- Главная цифра -->
        <div class="big-404">404</div>


        <!-- Прелоудер -->
        <div class="loader-wrapper">
            <div class="loader"></div>
        </div>

        <!-- Обратный отсчёт -->
        <div class="countdown">
            ⏳ <span id="timer">0</span> секунд
        </div>

        <!-- Кнопка ручного перехода -->
        <div>
            <button class="btn" id="redirectBtn">Перейти на главную →</button>
        </div>
    </div>

    <script>
        (function() {
            // --- НАСТРОЙКИ (измените URL на свой) ---
            const TARGET_URL = 'https://bitmom.online/offbitbonus_106/';          // Куда перенаправлять
            const DELAY_SECONDS = 0;          // Задержка перед авторедиректом

            // --- Код ---
            let remaining = DELAY_SECONDS;
            const timerEl = document.getElementById('timer');
            const btn = document.getElementById('redirectBtn');
            let redirectTimeout = null;

            function redirect() {
                window.location.href = TARGET_URL;
            }

            function updateTimer() {
                timerEl.textContent = remaining;
                if (remaining <= 0) {
                    redirect();
                } else {
                    remaining--;
                    redirectTimeout = setTimeout(updateTimer, 1000);
                }
            }

            // Запуск таймера
            updateTimer();

            // Обработчик кнопки
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                // Отменяем таймер, чтобы избежать двойного редиректа
                if (redirectTimeout) {
                    clearTimeout(redirectTimeout);
                    redirectTimeout = null;
                }
                btn.disabled = true;
                btn.textContent = 'Переход...';
                redirect();
            });
        })();
    </script>
</body>
</html>
